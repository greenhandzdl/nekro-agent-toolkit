name: Generate Installer Files

on:
  workflow_dispatch:
    inputs:
      with_napcat:
        description: 'Include NapCat service'
        type: boolean
        default: true
      language:
        description: 'Language'
        type: choice
        options:
          - zh_CN
          - en_US
        default: zh_CN

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            module
            utils
            conf
            requirements.txt
            doc/installer/README-zh_CN.md
            doc/installer/README-en_US.md

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync

      - name: Create temp data directory
        run: |
          mkdir -p ${{ runner.temp }}/na_data

      - name: Generate .env file (dry-run)
        run: |
          python ${{ github.workspace }}/module/install.py ${{ runner.temp }}/na_data --dry-run --yes

      - name: Download docker-compose file
        run: |
          COMPOSE_FILE="docker-compose-x-napcat.yml"
          if [ "${{ github.event.inputs.with_napcat }}" != "true" ]; then
            COMPOSE_FILE="docker-compose.yml"
          fi

          # Try multiple base URLs
          BASE_URLS=(
            "https://raw.githubusercontent.com/KroMiose/nekro-agent/main/docker"
            "https://cdn.jsdelivr.net/gh/KroMiose/nekro-agent@main/docker"
          )

          for url in "${BASE_URLS[@]}"; do
            echo "Trying $url/$COMPOSE_FILE..."
            if curl -fsSL -o "${{ runner.temp }}/na_data/$COMPOSE_FILE" "$url/$COMPOSE_FILE"; then
              echo "Successfully downloaded from $url"
              break
            fi
          done

          # Rename to docker-compose.yml for consistency
          mv "${{ runner.temp }}/na_data/$COMPOSE_FILE" "${{ runner.temp }}/na_data/docker-compose.yml"

      - name: Display docker-compose file
        run: |
          echo "=== docker-compose.yml (first 30 lines) ==="
          head -n 30 ${{ runner.temp }}/na_data/docker-compose.yml

      - name: Create installer package
        run: |
          mkdir -p ${{ runner.temp }}/installer_package
          cp ${{ runner.temp }}/na_data/.env ${{ runner.temp }}/installer_package/
          cp ${{ runner.temp }}/na_data/docker-compose.yml ${{ runner.temp }}/installer_package/

          # Copy README based on language
          if [ "${{ github.event.inputs.language }}" = "en_US" ]; then
            cp ${{ github.workspace }}/doc/installer/README-en_US.md ${{ runner.temp }}/installer_package/README.md
          else
            cp ${{ github.workspace }}/doc/installer/README-zh_CN.md ${{ runner.temp }}/installer_package/README.md
          fi

          cd ${{ runner.temp }}/installer_package
          zip -r installer.zip ./

      - name: Upload installer package
        uses: actions/upload-artifact@v4
        with:
          name: installer-files
          path: ${{ runner.temp }}/installer_package/installer.zip
          retention-days: 7